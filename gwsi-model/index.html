<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GWSI 2.0 全球风电战略指数评估</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 { font-size: 1.8em; margin-bottom: 8px; }
        header p { opacity: 0.9; font-size: 0.95em; }

        .content { padding: 30px; }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #2a5298;
        }

        .section-title {
            font-size: 1.2em;
            color: #1e3c72;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .indicators {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .indicator-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .indicator-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .indicator-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="number"], input[type="range"] {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95em;
        }

        input[type="number"] {
            width: 80px;
            max-width: 80px;
        }

        .value-display {
            min-width: 40px;
            text-align: right;
            font-weight: 600;
            color: #2a5298;
        }

        .result-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .result-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .result-label {
            font-size: 0.85em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .result-rank {
            font-size: 0.9em;
            opacity: 0.85;
        }

        .radar-chart {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-calculate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-calculate:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3); }

        .btn-reset {
            background: #ddd;
            color: #333;
        }

        .btn-reset:hover { background: #ccc; }

        .description {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.9em;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .indicators { grid-template-columns: 1fr; }
            .result-cards { grid-template-columns: 1fr; }
            header h1 { font-size: 1.4em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 GWSI 2.0 全球风电战略指数评估</h1>
            <p>全球风电产业竞争力评估与战略决策工具</p>
        </header>

        <div class="content">
            <div class="description">
                GWSI 2.0指数由9个关键维度组成，用于评估国家/地区的风电产业竞争力。每个维度评分范围0-100分，综合得分决定全球排名和战略地位。
            </div>

            <div class="section">
                <div class="section-title">📊 核心指标评估</div>
                <div class="indicators" id="indicators"></div>
            </div>

            <div class="section">
                <div class="section-title">📈 评估结果</div>
                <div class="result-cards" id="resultCards"></div>
                <div class="radar-chart">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-calculate" onclick="calculateGWSI()">计算GWSI指数</button>
                <button class="btn-reset" onclick="resetForm()">重置表单</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script>
        const INDICATORS = [
            { name: '市场规划力', code: 'market_sizing', desc: '市场规模与增长潜力', weight: 0.25 },
            { name: '融入融资', code: 'financing', desc: '融资能力与资本投入', weight: 0.15 },
            { name: '项目管理能力', code: 'project_mgmt', desc: '工程建设与项目管理', weight: 0.10 },
            { name: '资本安全', code: 'capital_safety', desc: '投资保护与风险管理', weight: 0.10 },
            { name: '本地化能力', code: 'localization', desc: '本地产业链与制造业', weight: 0.10 },
            { name: '贸易障碍', code: 'trade_barriers', desc: '市场开放程度', weight: 0.10 },
            { name: '工业整合', code: 'industry_integration', desc: '产业协同与整合', weight: 0.05 },
            { name: '区域整合', code: 'region_integration', desc: '区域协作与拓展', weight: 0.05 },
            { name: '政策激励', code: 'policy_incentive', desc: '政策支持与激励', weight: 0.10 }
        ];

        let chart = null;

        function initForm() {
            const container = document.getElementById('indicators');
            container.innerHTML = INDICATORS.map((ind, idx) => `
                <div class="indicator-item">
                    <div class="indicator-label">${idx + 1}. ${ind.name}</div>
                    <div style="font-size: 0.85em; color: #999; margin-bottom: 10px;">${ind.desc}</div>
                    <div class="indicator-input">
                        <input type="range" min="0" max="100" value="50" 
                               id="range_${ind.code}" 
                               onchange="updateValue('${ind.code}')">
                        <input type="number" min="0" max="100" value="50" 
                               id="value_${ind.code}" 
                               onchange="updateRange('${ind.code}')">
                        <span class="value-display">分</span>
                    </div>
                </div>
            `).join('');
        }

        function updateValue(code) {
            const rangeValue = document.getElementById(`range_${code}`).value;
            document.getElementById(`value_${code}`).value = rangeValue;
        }

        function updateRange(code) {
            const numValue = Math.min(100, Math.max(0, document.getElementById(`value_${code}`).value));
            document.getElementById(`value_${code}`).value = numValue;
            document.getElementById(`range_${code}`).value = numValue;
        }

        function calculateGWSI() {
            let totalScore = 0;
            const scores = {};

            INDICATORS.forEach(ind => {
                const value = parseFloat(document.getElementById(`value_${ind.code}`).value) || 0;
                scores[ind.code] = value;
                totalScore += value * ind.weight;
            });

            const gwsiScore = totalScore.toFixed(2);
            const rank = getRank(gwsiScore);

            displayResults(gwsiScore, rank, scores);
            updateRadarChart(scores);
        }

        function getRank(score) {
            if (score >= 75) return { rank: '领先', level: 'Leader', color: '#10b981' };
            if (score >= 60) return { rank: '先进', level: 'Advanced', color: '#3b82f6' };
            if (score >= 45) return { rank: '发展中', level: 'Developing', color: '#f59e0b' };
            return { rank: '初级', level: 'Initial', color: '#ef4444' };
        }

        function displayResults(gwsiScore, rank, scores) {
            const resultCards = document.getElementById('resultCards');
            
            const topIndicators = INDICATORS
                .map(ind => ({ ...ind, value: scores[ind.code] }))
                .sort((a, b) => b.value - a.value)
                .slice(0, 3);

            resultCards.innerHTML = `
                <div class="result-card" style="grid-column: 1 / -1; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);">
                    <div class="result-label">全球风电战略指数(GWSI 2.0)</div>
                    <div class="result-value">${gwsiScore}</div>
                    <div class="result-rank">排名: ${rank.rank} (${rank.level})</div>
                </div>
                ${topIndicators.map(ind => `
                    <div class="result-card">
                        <div class="result-label">🏆 ${ind.name}</div>
                        <div class="result-value">${ind.value}</div>
                        <div class="result-rank">优势指标</div>
                    </div>
                `).join('')}
            `;
        }

        function updateRadarChart(scores) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: INDICATORS.map(ind => ind.name),
                    datasets: [{
                        label: 'GWSI 2.0 评分',
                        data: INDICATORS.map(ind => scores[ind.code] || 0),
                        borderColor: '#2a5298',
                        backgroundColor: 'rgba(42, 82, 152, 0.2)',
                        pointBackgroundColor: '#2a5298',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: true, position: 'top' }
                    },
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { stepSize: 20 }
                        }
                    }
                }
            });
        }

        function resetForm() {
            INDICATORS.forEach(ind => {
                document.getElementById(`value_${ind.code}`).value = 50;
                document.getElementById(`range_${ind.code}`).value = 50;
            });
            document.getElementById('resultCards').innerHTML = '';
            if (chart) chart.destroy();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', initForm);
    </script>
</body>
</html>
